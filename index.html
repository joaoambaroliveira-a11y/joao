<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="form-cadastro" class="card">
            <h2>Novo Cliente</h2>
            <p>Preencha os dados abaixo para realizar o registro.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="joao@exemplo.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="tel">Telefone</label>
                    <input type="tel" id="tel" placeholder="(11) 99999-9999">
                </div>
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                </div>
            </div>

            <button type="submit" class="btn-salvar">Cadastrar Cliente</button>
        </form>
    </div>
</body>
</html>
